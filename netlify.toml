[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Configuración del Cron Job (Checkout automático)
# En Netlify, esto se maneja mediante Scheduled Functions
# Nota: La función llamará a tu API interna cada día a las 5 AM.
[[edge_functions]]
  path = "/api/cron/checkout"
  function = "cron-checkout"

# Si prefieres una función programada nativa de Netlify:
[functions."cron-checkout"]
  schedule = "0 5 * * *"
